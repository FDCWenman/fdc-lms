name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
      - 001-auth-login-registration
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

jobs:
  unit-feature-tests:
    name: Unit & Feature Tests
    runs-on: ubuntu-latest
    environment: Testing
    strategy:
      matrix:
        php-version: ['8.3', '8.4']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Add Flux Credentials Loaded From ENV
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Set Testing Environment Variables
        run: |
          echo "APP_ENV=testing" >> .env
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=:memory:" >> .env
          echo "SLACK_BOT_TOKEN=test-token" >> .env
          echo "SLACK_API_USERID=U123456789" >> .env
          echo "SLACK_CHANNEL_ID=C123456789" >> .env
          echo "SLACK_HIGH_TOKEN=test-high-token" >> .env

      - name: Run Database Migrations
        run: php artisan migrate --force

      - name: Seed Database
        run: php artisan db:seed --force

      - name: Build Assets
        run: npm run build

      - name: Run Tests with Coverage
        run: php artisan test --parallel --coverage-text

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-php-${{ matrix.php-version }}
          path: |
            storage/logs/
            tests/results/

  dusk-tests:
    name: Dusk E2E Tests
    runs-on: ubuntu-latest
    environment: Testing

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          extensions: pdo, sqlite, pdo_sqlite

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable

      - name: Install ChromeDriver
        run: php artisan dusk:chrome-driver --detect

      - name: Install Node Dependencies
        run: npm i

      - name: Add Flux Credentials
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Copy Environment File
        run: cp .env.example .env.dusk.local

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Set Dusk Environment Variables
        run: |
          echo "APP_URL=http://127.0.0.1:8000" >> .env.dusk.local
          echo "DB_CONNECTION=sqlite" >> .env.dusk.local
          echo "DB_DATABASE=database/database.sqlite" >> .env.dusk.local
          echo "SLACK_BOT_TOKEN=test-token" >> .env.dusk.local
          echo "SLACK_API_USERID=U123456789" >> .env.dusk.local
          echo "SLACK_CHANNEL_ID=C123456789" >> .env.dusk.local
          echo "SLACK_HIGH_TOKEN=test-high-token" >> .env.dusk.local

      - name: Create Database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Run Database Migrations
        run: php artisan migrate --env=dusk.local --force

      - name: Seed Database
        run: php artisan db:seed --env=dusk.local --force

      - name: Build Assets
        run: npm run build

      - name: Start Chrome Driver
        run: vendor/bin/dusk-driver start &

      - name: Start Laravel Server
        run: php artisan serve --env=dusk.local &

      - name: Wait for Server
        run: sleep 5

      - name: Run Dusk Tests
        run: php artisan dusk

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dusk-screenshots
          path: tests/Browser/screenshots

      - name: Upload Console Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dusk-console-logs
          path: tests/Browser/console

```
